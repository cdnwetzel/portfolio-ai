name: Deploy SaaS Platform

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'frontend/**'
      - 'requirements.txt'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: saas_test
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pytest pytest-asyncio

    - name: Run tests
      env:
        DATABASE_URL: postgresql+asyncpg://postgres:test@localhost/saas_test
      run: |
        set -eo pipefail
        pytest tests/ -v

  deploy:
    needs: [test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Setup SSH
      run: |
        set -eo pipefail
        mkdir -p ~/.ssh
        echo "${{ secrets.CLOUD_SSH_KEY }}" > ~/.ssh/deploy
        chmod 600 ~/.ssh/deploy
        ssh-keyscan -H ${{ secrets.CLOUD_IP }} >> ~/.ssh/known_hosts

    - name: Deploy backend
      run: |
        set -eo pipefail
        rsync -avz \
          -e "ssh -i ~/.ssh/deploy" \
          src/ requirements.txt Dockerfile docker-compose.yml \
          ubuntu@${{ secrets.CLOUD_IP }}:/opt/portfolio-saas/

    - name: Notify Slack
      if: always()
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        text: 'Deployment ${{ job.status }}'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
      continue-on-error: true
